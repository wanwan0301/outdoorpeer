<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水域活動工作室 - 遊客資料管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="site-header">
        <div class="site-header__inner">
            <div class="brand">
                <span class="brand__title">水域活動工作室</span>
                <span class="brand__mode">後端管理系統</span>
            </div>
            <nav class="nav">
                <a href="tourists.html" class="nav-link is-active">遊客資料</a>
                <a href="coach.html" class="nav-link">教練資料</a>
                <a href="equip.html" class="nav-link">器材資產</a>
                <a href="courses.html" class="nav-link">開設課程</a>
            </nav>
        </div>
    </header>

    <main class="container page">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="form-panel h-fit text-sm">
                <h2 class="text-lg font-semibold text-slate-700 mb-4">新增遊客資料</h2>
                <form id="addTouristForm" class="space-y-4">
                    <div class="form-group">
                        <label class="form-label">身分證字號</label>
                        <input type="text" id="tIdNumber" required pattern="^[A-Z][1-2][0-9]{8}$" placeholder="例如：A123456789" 
                               class="form-control uppercase">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="form-group">
                            <label class="form-label">姓名</label>
                            <input type="text" id="tName" required placeholder="姓名" 
                                   class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">性別</label>
                            <select id="tGender" class="form-control">
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">出生年月日</label>
                        <input type="date" id="tBirthDate" required 
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">聯絡電話</label>
                        <input type="text" id="tPhone" required placeholder="例如：0912345678" 
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="tEmail" placeholder="example@email.com" 
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">飲食習慣</label>
                        <input type="text" id="tDiet" value="葷食" placeholder="例如：全素、葷食" 
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">地址</label>
                        <input type="text" id="tAddress" placeholder="例如：台北市信義區松仁路123號" 
                               class="form-control">
                    </div>
                    <div class="border-t pt-2 mt-2 space-y-2">
                        <p class="text-xs font-bold text-slate-500">緊急人聯絡資訊</p>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="tEmergencyContact" placeholder="姓名" 
                                   class="form-control text-xs" style="min-height: 36px;">
                            <input type="text" id="tEmergencyPhone" placeholder="電話" 
                                   class="form-control text-xs" style="min-height: 36px;">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        確認新增遊客
                    </button>
                </form>
            </div>

            <div class="table-panel md:col-span-3">
                <div class="table-toolbar">
                    <h2 class="table-title">遊客列表</h2>
                </div>

                <div class="p-5 border-b flex flex-col sm:flex-row gap-3 items-end text-sm">
                    <div class="w-full sm:flex-1">
                        <label class="form-label text-xs">綜合關鍵字搜尋</label>
                        <input type="text" id="searchKeyword" placeholder="搜尋姓名、身分證、電話..."
                            class="form-control mt-1">
                    </div>
                    <div class="w-full sm:w-[130px]">
                        <label class="form-label text-xs">性別篩選</label>
                        <select id="searchGender" class="form-control mt-1">
                            <option value="全部">全部性別</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="fetchTourists()" class="btn btn-primary">
                            搜尋
                        </button>
                        <button onclick="resetFilters()" class="btn btn-secondary">
                            顯示所有
                        </button>
                    </div>
                </div>
                
                <div class="table-scroll">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>身分證字號</th>
                                <th>姓名(性別)</th>
                                <th>出生日期</th>
                                <th>電話</th>
                                <th>電子信箱</th>
                                <th class="text-center">飲食</th>
                                <th>地址</th>
                                <th>緊急聯絡人</th>
                                <th>加入時間</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="touristTableBody">
                            <tr>
                                <td colspan="10" class="p-4 text-center text-slate-400">資料載入中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==========================================================
        // 🔑 填寫你的 Supabase 連線資訊
        // ==========================================================
        const SUPABASE_URL = 'https://myvxgyovbckilyoelgxe.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dnhneW92YmNraWx5b2VsZ3hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjU4MjUsImV4cCI6MjA5NzgwMTgyNX0.bj0b5c72OIB16kw811XfNpTKOAkq34Of4YzUeuVqLJI'; 

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener('DOMContentLoaded', () => {
            fetchTourists();
        });

        // ==========================================================
        // 🔍 【支援搜尋與篩選的查詢功能】
        // ==========================================================
        async function fetchTourists() {
            const tbody = document.getElementById('touristTableBody');
            tbody.innerHTML = '<tr><td colspan="10" class="p-4 text-center text-slate-400">正在檢索名冊...</td></tr>';
            
            const keyword = document.getElementById('searchKeyword').value.trim();
            const gender = document.getElementById('searchGender').value;
            
            let query = _supabase.from('tourists').select('*'); // 建立 Supabase 基礎查詢物件

            // 關鍵字多欄位模糊搜尋 (使用 Supabase 的 .or 條件)
            if (keyword !== '') {
                // ilike 代表不區分大小寫的模糊搜尋；用逗號隔開代表「或 (OR)」
                query = query.or(`name.ilike.%${keyword}%,id_number.ilike.%${keyword}%,phone.ilike.%${keyword}%`);
            }

            // 篩選性別
            if (gender !== '全部') {
                query = query.eq('gender', gender);
            }

            // 執行查詢並排序（新建立的在最前面）
            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) {
                alert('遊客資料讀取失敗：' + error.message);
                return;
            }

            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10" class="p-4 text-center text-slate-400">找不到符合條件的遊客資料</td></tr>`;
                return;
            }

            // 渲染資料至前端
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="font-mono font-bold text-slate-600 whitespace-nowrap">${item.id_number}</td>
                    <td class="whitespace-nowrap">
                        <span class="font-medium">${item.name}</span>
                        <span class="text-xs text-slate-400">(${item.gender})</span>
                    </td>
                    <td class="font-mono text-slate-500 whitespace-nowrap">${item.birth_date}</td>
                    <td class="font-mono text-slate-500 whitespace-nowrap">${item.phone}</td>
                    <td class="font-mono text-slate-500 min-w-[200px] break-all">${item.email || '<span class="text-slate-300">未填</span>'}</td>
                    <td class="text-center whitespace-nowrap">
                        <span class="badge ${item.dietary_habit === '葷食' ? 'badge-muted' : 'badge-success'}">
                            ${item.dietary_habit}
                        </span>
                    </td>
                    <td class="font-mono text-slate-500 min-w-[200px] break-all">${item.address || '<span class="text-slate-300">未填</span>'}</td>
                    <td class="text-slate-500 text-xs">
                        <div class="font-medium text-slate-700">${item.emergency_contact || '未填'}</div>
                        <div class="font-mono text-slate-400 mt-0.5">${item.emergency_phone || ''}</div>
                    </td>
                    <td class="font-mono text-slate-500">${item.created_at}</td>
                    <td class="text-center whitespace-nowrap">
                        <button onclick="deleteTourist('${item.id_number}')" 
                                class="btn btn-danger text-xs" style="min-height: 28px; padding: 4px 8px; box-shadow: none;">
                            刪除
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ==========================================================
        // 【重設篩選條件並顯示所有名冊】
        // ==========================================================
        function resetFilters() {
            // 清空輸入框與下拉選單
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchGender').value = '全部';
            // 重新載入完整資料
            fetchTourists();
        }

        document.getElementById('addTouristForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id_number = document.getElementById('tIdNumber').value.trim().toUpperCase();
            const name = document.getElementById('tName').value;
            const gender = document.getElementById('tGender').value;
            const birth_date = document.getElementById('tBirthDate').value;
            const phone = document.getElementById('tPhone').value;
            const email = document.getElementById('tEmail').value || null;
            const dietary_habit = document.getElementById('tDiet').value;
            const address = document.getElementById('tAddress').value || null;
            const emergency_contact = document.getElementById('tEmergencyContact').value || null;
            const emergency_phone = document.getElementById('tEmergencyPhone').value || null;

            const { error } = await _supabase
                .from('tourists')
                .insert([
                    { id_number, name, gender, birth_date, phone, email, dietary_habit, address, emergency_contact, emergency_phone }
                ]);

            if (error) {
                alert('新增失敗：' + error.message);
            } else {
                alert('遊客資料登記成功！');
                document.getElementById('addTouristForm').reset();
                document.getElementById('tDiet').value = '葷食';
                fetchTourists();
            }
        });

        async function deleteTourist(id_number) {
            if (!confirm(`確定要永久刪除遊客 [${id_number}] 的資料嗎？`)) return;

            const { error } = await _supabase
                .from('tourists')
                .delete()
                .eq('id_number', id_number);

            if (error) {
                alert('刪除失敗：' + error.message);
            } else {
                alert('遊客資料已成功刪除！');
                fetchTourists();
            }
        }
    </script>
</body>
</html>
