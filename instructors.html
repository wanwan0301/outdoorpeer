<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水域活動工作室 - 教練資料管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6 font-sans">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 border-b pb-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">水域活動工作室 - 後端管理系統</h1>
            </div>
            <div class="flex flex-wrap gap-2">
                <a href="tourists.html" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium px-4 py-2 rounded-md transition text-sm flex items-center gap-1">
                    遊客資料
                </a>
                <a href="instructors.html" class="bg-blue-600 text-white font-medium px-4 py-2 rounded-md shadow-sm transition text-sm flex items-center gap-1">
                    教練資料
                </a>
                <a href="index.html" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium px-4 py-2 rounded-md transition text-sm flex items-center gap-1">
                    器材資產
                </a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 h-fit text-sm">
                <h2 class="text-lg font-semibold text-slate-700 mb-4">新增教練資料</h2>
                <form id="addInstructorForm" class="space-y-4">
                    <div>
                        <label class="block font-medium text-slate-600 mb-1">身分證字號</label>
                        <input type="text" id="iIdNumber" required pattern="^[A-Z][1-2][0-9]{8}$" placeholder="例如：A123456789" 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none uppercase">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block font-medium text-slate-600 mb-1">姓名</label>
                            <input type="text" id="iName" required placeholder="教練姓名" 
                                   class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block font-medium text-slate-600 mb-1">性別</label>
                            <select id="iGender" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block font-medium text-slate-600 mb-1">出生年月日</label>
                        <input type="date" id="iBirthDate" required 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block font-medium text-slate-600 mb-1">聯絡電話</label>
                        <input type="text" id="iPhone" required placeholder="例如：0912345678" 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block font-medium text-slate-600 mb-1">Email</label>
                        <input type="email" id="iEmail" placeholder="coach@studio.com" 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block font-medium text-slate-600 mb-1">飲食習慣</label>
                        <input type="text" id="iDiet" value="葷食" placeholder="例如：全素、葷食" 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block font-medium text-slate-600 mb-1">地址</label>
                        <input type="text" id="iAddress" placeholder="例如：台北市信義區松仁路123號" 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block font-medium text-slate-600 mb-1">自我介紹</label>
                        <textarea id="iBio" rows="2" placeholder="簡述教練背景或特殊專長..." 
                                  class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none"></textarea>
                    </div>
                    <div class="border-t pt-2 mt-2 space-y-2">
                        <p class="text-xs font-bold text-slate-500">緊急聯絡資訊</p>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="iEmergencyContact" placeholder="姓名" 
                                   class="w-full p-2 border rounded-md text-xs focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <input type="text" id="iEmergencyPhone" placeholder="電話" 
                                   class="w-full p-2 border rounded-md text-xs focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition duration-200">
                        確認新增教練
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 md:col-span-3">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-slate-700">教練名冊列表</h2>
                </div>
                
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-6 flex flex-col sm:flex-row gap-3 items-end text-sm">
                    <div class="w-full sm:flex-1">
                        <label class="block text-xs font-medium text-slate-500 mb-1">綜合關鍵字搜尋</label>
                        <input type="text" id="searchKeyword" placeholder="搜尋姓名、身分證、電話..."
                               class="w-full p-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                    </div>
                    <div class="w-full sm:w-[130px]">
                        <label class="block text-xs font-medium text-slate-500 mb-1">性別篩選</label>
                        <select id="searchGender" class="w-full p-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                            <option value="全部">全部性別</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="fetchInstructors()" class="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-700 text-white font-medium px-5 py-2 rounded-md transition shadow-sm">
                            搜尋
                        </button>
                        <button onclick="resetFilters()" class="flex-1 sm:flex-none bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium px-4 py-2 rounded-md transition whitespace-nowrap">
                            顯示所有
                        </button>
                    </div>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse table-auto min-w-[1000px]">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm font-medium">
                                <th class="p-2.5 whitespace-nowrap">身分證字號</th>
                                <th class="p-2.5 whitespace-nowrap">姓名(性別)</th>
                                <th class="p-2.5 whitespace-nowrap">出生日期</th>
                                <th class="p-2.5 whitespace-nowrap">電話</th>
                                <th class="p-2.5 whitespace-nowrap">電子信箱</th>
                                <th class="p-2.5 text-center whitespace-nowrap">飲食</th>
                                <th class="p-2.5 whitespace-nowrap">地址</th>
                                <th class="p-2.5 whitespace-nowrap">自我介紹</th>
                                <th class="p-2.5 whitespace-nowrap">緊急聯絡人</th>
                                <th class="p-2.5 whitespace-nowrap">加入時間</th>
                                <th class="p-2.5 text-center whitespace-nowrap">操作</th>
                            </tr>
                        </thead>
                        <tbody id="instructorTableBody" class="text-slate-700 text-sm divide-y divide-slate-100">
                            <tr>
                                <td colspan="7" class="p-4 text-center text-slate-400">資料載入中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==========================================================
        // 🔑 填寫你的 Supabase 連線資訊
        // ==========================================================
        const SUPABASE_URL = 'https://myvxgyovbckilyoelgxe.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dnhneW92YmNraWx5b2VsZ3hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjU4MjUsImV4cCI6MjA5NzgwMTgyNX0.bj0b5c72OIB16kw811XfNpTKOAkq34Of4YzUeuVqLJI'; 

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener('DOMContentLoaded', () => {
            fetchInstructors();
        });

        // ==========================================================
        // 🔍 【功能：查詢教練與篩選】
        // ==========================================================
        async function fetchInstructors() {
            const tbody = document.getElementById('instructorTableBody');
            tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center text-slate-400">正在檢索名冊...</td></tr>';
            
            const keyword = document.getElementById('searchKeyword').value.trim();
            const gender = document.getElementById('searchGender').value;

            let query = _supabase.from('instructors').select('*');

            // 支援 姓名、身分證、電話 的萬用模糊搜尋
            if (keyword !== '') {
                query = query.or(`name.ilike.%${keyword}%,id_number.ilike.%${keyword}%,phone.ilike.%${keyword}%`);
            }

            // 性別過濾
            if (gender !== '全部') {
                query = query.eq('gender', gender);
            }

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) {
                alert('教練資料讀取失敗：' + error.message);
                return;
            }

            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-slate-400">找不到符合條件的教練資料</td></tr>`;
                return;
            }

            // 渲染表格
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="p-2.5 font-mono font-bold text-slate-600 whitespace-nowrap">${item.id_number}</td>
                    <td class="p-2.5 whitespace-nowrap">
                        <span class="font-medium">${item.name}</span>
                        <span class="text-xs text-slate-400">(${item.gender})</span>
                    </td>
                    <td class="p-2.5 font-mono text-slate-500 whitespace-nowrap">${item.birth_date}</td>
                    <td class="p-2.5 font-mono text-slate-500 whitespace-nowrap">${item.phone}</td>
                    <td class="p-2.5 font-mono text-slate-500 min-w-[200px] break-all">${item.email || '<span class="text-slate-300">—</span>'}</td>
                    <td class="p-2.5 text-center whitespace-nowrap">
                        <span class="px-2 py-0.5 rounded text-xs ${item.dietary_habit === '葷食' ? 'bg-slate-100 text-slate-700' : 'bg-green-100 text-green-700'}">
                            ${item.dietary_habit}
                        </span>
                    </td>
                    <td class="p-2.5 font-mono text-slate-500 min-w-[200px] break-all">${item.address || '<span class="text-slate-300">未填</span>'}</td>
                    <td class="p-2.5 text-slate-500 max-w-[200px] truncate" title="${item.bio || ''}">${item.bio || '<span class="text-slate-300">—</span>'}</td>
                    <td class="p-2.5 text-slate-500 text-xs whitespace-nowrap">
                        <div class="font-medium text-slate-700">${item.emergency_contact || '未填'}</div>
                        <div class="font-mono text-slate-400 mt-0.5">${item.emergency_phone || ''}</div>
                    </td>
                    <td class="p-2.5 font-mono text-slate-500">${item.created_at}</td>
                    <td class="p-2.5 text-center whitespace-nowrap">
                        <button onclick="deleteInstructor('${item.id_number}')" 
                                class="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-2 py-1 rounded border border-red-200 transition">
                            刪除
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ==========================================================
        // 🔄 【功能：重設並顯示所有名冊】
        // ==========================================================
        function resetFilters() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchGender').value = '全部';
            fetchInstructors();
        }

        // ==========================================================
        // ➕ 【功能：新增教練 Create】
        // ==========================================================
        document.getElementById('addInstructorForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id_number = document.getElementById('iIdNumber').value.trim().toUpperCase();
            const name = document.getElementById('iName').value;
            const gender = document.getElementById('iGender').value;
            const birth_date = document.getElementById('iBirthDate').value;
            const phone = document.getElementById('iPhone').value;
            const email = document.getElementById('iEmail').value || null;
            const dietary_habit = document.getElementById('iDiet').value;
            const address = document.getElementById('iAddress').value || null;
            const bio = document.getElementById('iBio').value || null;
            const emergency_contact = document.getElementById('iEmergencyContact').value || null;
            const emergency_phone = document.getElementById('iEmergencyPhone').value || null;

            const { error } = await _supabase
                .from('instructors')
                .insert([
                    { id_number, name, gender, birth_date, phone, email, dietary_habit, address, bio, emergency_contact, emergency_phone }
                ]);

            if (error) {
                alert('新增失敗（身分證重複或資料錯誤）：' + error.message);
            } else {
                alert('新教練資料建檔成功！');
                document.getElementById('addInstructorForm').reset();
                document.getElementById('iDiet').value = '葷食';
                fetchInstructors();
            }
        });

        // ==========================================================
        // ❌ 【功能：刪除教練 Delete】
        // ==========================================================
        async function deleteInstructor(id_number) {
            if (!confirm(`確定要永久刪除教練 [${id_number}] 的資料嗎？\n請注意：這會連帶刪除該教練的專長與證照紀錄。`)) return;

            const { error } = await _supabase
                .from('instructors')
                .delete()
                .eq('id_number', id_number);

            if (error) {
                alert('刪除失敗，該教練目前可能有開課場次或負責保管器材：' + error.message);
            } else {
                alert('教練資料已成功刪除！');
                fetchInstructors();
            }
        }
    </script>
</body>
</html>
