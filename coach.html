<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水域活動工作室 - 教練資料管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 min-h-screen font-sans">

    <header class="site-header">
        <div class="site-header__inner">
            <div class="brand">
                <span class="brand__title">水域活動工作室</span>
                <span class="brand__mode">後端管理系統</span>
            </div>
            <nav class="nav">
                <a href="tourists.html" class="nav-link">遊客資料</a>
                <a href="coach.html" class="nav-link is-active">教練資料</a>
                <a href="equip.html" class="nav-link">器材資產</a>
                <a href="courses.html" class="nav-link">開設課程</a>
            </nav>
        </div>
    </header>

    <main class="container page">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="form-panel h-fit text-sm">
                <h2 class="text-lg font-semibold text-slate-700 mb-4">新增教練資料</h2>
                <form id="addInstructorForm" class="space-y-4">
                    <div class="form-group">
                        <label class="form-label">身分證字號</label>
                        <input type="text" id="iIdNumber" required pattern="^[A-Z][1-2][0-9]{8}$"
                            placeholder="例如：A123456789" class="form-control uppercase">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="form-group">
                            <label class="form-label">姓名</label>
                            <input type="text" id="iName" required placeholder="姓名" class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">性別</label>
                            <select id="iGender" class="form-control">
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">出生年月日</label>
                        <input type="date" id="iBirthDate" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">聯絡電話</label>
                        <input type="text" id="iPhone" required placeholder="例如：0912345678" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="iEmail" placeholder="coach@studio.com" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">飲食習慣</label>
                        <input type="text" id="iDiet" placeholder="例如：全素、葷食" class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">地址</label>
                        <input type="text" id="iAddress" placeholder="例如：台北市信義區松仁路123號" class="form-control">
                    </div>
                    <div class="border-t pt-2 mt-2">
                        <label class="form-label flex justify-between items-center">
                            專長領域
                            <button type="button" onclick="addSpecialtyField()" class="btn btn-secondary text-xs"
                                style="min-height: 24px; padding: 2px 6px;">新增欄位</button>
                        </label>
                        <div id="specialtiesContainer" class="space-y-2 mt-2">
                            <input type="text" name="specialty" placeholder="例如：SUP" class="form-control">
                        </div>
                    </div>
                    <div class="border-t pt-2 mt-2 mb-4">
                        <label class="form-label flex justify-between items-center">
                            專業證照
                            <button type="button" onclick="addLicenseField()" class="btn btn-secondary text-xs"
                                style="min-height: 24px; padding: 2px 6px;">新增欄位</button>
                        </label>
                        <div id="licensesContainer" class="space-y-2 mt-2">
                            <input type="text" name="license" placeholder="例如：PADI OW 專任教練" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">自我介紹</label>
                        <textarea id="iBio" rows="2" placeholder="簡述教練背景或特殊專長..." class="form-control"
                            style="min-height: 80px;"></textarea>
                    </div>
                    <div class="border-t pt-2 mt-2 space-y-2">
                        <p class="text-xs font-bold text-slate-500">緊急聯絡資訊</p>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="iEmergencyContact" placeholder="姓名" class="form-control text-xs"
                                style="min-height: 36px;">
                            <input type="text" id="iEmergencyPhone" placeholder="電話" class="form-control text-xs"
                                style="min-height: 36px;">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        確認新增教練
                    </button>
                </form>
            </div>

            <div class="table-panel md:col-span-3">
                <div class="table-toolbar">
                    <h2 class="table-title">教練列表</h2>
                    <button onclick="exportToExcel()" class="btn btn-secondary text-xs"
                        style="min-height: 32px; padding: 4px 12px; box-shadow: none;">
                        匯出 Excel
                    </button>
                </div>

                <div class="p-5 border-b flex flex-col sm:flex-row gap-3 items-end text-sm">
                    <div class="w-full sm:flex-1">
                        <label class="form-label text-xs">綜合關鍵字搜尋</label>
                        <input type="text" id="searchKeyword" placeholder="搜尋姓名、身分證、電話..." class="form-control mt-1">
                    </div>
                    <div class="w-full sm:w-[150px]">
                        <label class="form-label text-xs">專長篩選</label>
                        <select id="searchSpecialty" class="form-control mt-1">
                            <option value="全部">全部專長</option>
                            <option value="SUP立槳">SUP立槳</option>
                            <option value="獨木舟">獨木舟</option>
                            <option value="衝浪">衝浪</option>
                            <option value="自由潛水">自由潛水</option>
                            <option value="水肺潛水">水肺潛水</option>
                        </select>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="fetchInstructors()" class="btn btn-primary">
                            搜尋
                        </button>
                        <button onclick="resetFilters()" class="btn btn-secondary">
                            顯示所有
                        </button>
                    </div>
                </div>

                <div class="table-scroll">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>身分證字號</th>
                                <th>姓名(性別)</th>
                                <th>專長</th>
                                <th>電話</th>
                                <th>電子信箱</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="instructorTableBody">
                            <tr>
                                <td colspan="6" class="p-4 text-center text-slate-400">資料載入中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- ==========================================================
         教練詳細資料模態框 (Modal)
         ========================================================== -->
    <div id="detailsModal"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden transform transition-all m-4">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" stroke-width="2"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                    教練詳細資料
                </h3>
                <button onclick="closeDetailsModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <!-- Modal Body -->

                <!-- 基本資訊 -->

                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">基本資訊</h4>
                    <div class="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl">
                        <div>
                            <span class="text-slate-500 text-xs block">姓名</span>
                            <span id="modalName" class="font-semibold text-slate-800"></span>
                        </div>
                        <div>
                            <span class="text-slate-500 text-xs block">性別</span>
                            <span id="modalGender" class="font-semibold text-slate-800"></span>
                        </div>
                        <div>
                            <span class="text-slate-500 text-xs block">身分證字號</span>
                            <span id="modalIdNumber" class="font-semibold font-mono text-slate-800"></span>
                        </div>
                        <div>
                            <span class="text-slate-500 text-xs block">出生年月日</span>
                            <span id="modalBirthDate" class="font-semibold font-mono text-slate-800"></span>
                        </div>
                        <div class="col-span-2 border-t border-slate-200/60 pt-2 mt-1">
                            <span class="text-slate-500 text-xs block">建立時間</span>
                            <span id="modalCreatedAt" class="font-semibold font-mono text-slate-800"></span>
                        </div>
                    </div>
                </div>

                <!-- 聯絡資訊 -->
                <div>
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">聯絡資訊</h4>
                    <div class="space-y-3 bg-slate-50 p-4 rounded-xl">
                        <div class="flex justify-between border-b border-slate-200/60 pb-2">
                            <span class="text-slate-500">聯絡電話</span>
                            <span id="modalPhone" class="font-semibold font-mono text-slate-800"></span>
                        </div>
                        <div class="flex justify-between border-b border-slate-200/60 pb-2">
                            <span class="text-slate-500">Email</span>
                            <span id="modalEmail" class="font-semibold font-mono text-slate-800"></span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-slate-500 mb-1">通訊地址</span>
                            <span id="modalAddress" class="font-medium text-slate-800"></span>
                        </div>
                    </div>
                </div>

                <!-- 自我介紹 -->
                <div>
                    <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">自我介紹</h4>
                    <div class="bg-slate-50 p-4 rounded-xl min-h-[58px] text-slate-700 whitespace-pre-line"
                        id="modalBio">
                    </div>
                </div>

                <!-- 飲食與緊急聯絡 -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">飲食習慣</h4>
                        <div class="bg-slate-50 p-3 rounded-xl min-h-[58px] flex items-center">
                            <span id="modalDiet" class="font-semibold text-slate-800"></span>
                        </div>
                    </div>
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">緊急聯絡人</h4>
                        <div class="bg-slate-50 p-3 rounded-xl min-h-[58px]">
                            <div id="modalEmergencyContact" class="font-semibold text-slate-800"></div>
                            <div id="modalEmergencyPhone" class="text-xs font-mono text-slate-500 mt-0.5"></div>
                        </div>
                    </div>
                </div>

                <!-- 專長與證照 -->
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">專長領域</h4>
                        <div id="modalSpecialtiesContainer"
                            class="flex flex-wrap gap-2 p-3 border border-slate-100 rounded-xl bg-slate-50/50">
                        </div>
                    </div>
                    <div>
                        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">專業證照</h4>
                        <div id="modalLicensesContainer"
                            class="flex flex-wrap gap-2 p-3 border border-slate-100 rounded-xl bg-slate-50/50">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Modal Footer -->
            <div class="px-6 py-3 border-t border-slate-100 bg-slate-50 flex justify-end">
                <button onclick="closeDetailsModal()"
                    class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium rounded-lg text-xs transition-colors">
                    關閉
                </button>
            </div>
        </div>
    </div>

        document.getElementById('addInstructorForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id_number = document.getElementById('iIdNumber').value.trim().toUpperCase();
            const name = document.getElementById('iName').value;
            const gender = document.getElementById('iGender').value;
            const birth_date = document.getElementById('iBirthDate').value;

            const dietary_habit = document.getElementById('iDiet').value;

                .filter(value => value !== '');

            const { error: instructorError } = await _supabase
                .from('coach')
                .insert([
                    { id_number, name, gender, birth_date, phone, email, dietary_habit, address, bio, emergency_contact, emergency_phone }
                ]);

            if (instructorError) {
                alert('新增失敗（身分證可能重複或格式錯誤）：' + instructorError.message);

            }

            if (specialties.length > 0) {

        // ❌ 【功能：刪除教練 Delete】
        // ==========================================================
        async function deleteInstructor(id_number) {
            if (!confirm(`確定要永久刪除教練 [${id_number}] 的資料嗎？\n請注意：這會連帶刪除該教練的專長與證照紀錄。`)) return;

            const { error } = await _supabase
                .from('coach')
                .delete()
                .eq('id_number', id_number);

            if (error) {
                alert('刪除失敗，該教練目前可能有開課場次或負責保管器材：' + error.message);
            } else {
                alert('教練資料已成功刪除！');
                fetchInstructors();
            }
        }

        function showInstructorDetails(index) {
            const item = window.instructorsData[index];
            if (!item) return;

            document.getElementById('modalName').textContent = item.name || '未填';
            document.getElementById('modalGender').textContent = item.gender || '未填';
            document.getElementById('modalIdNumber').textContent = item.id_number || '未填';
            document.getElementById('modalBirthDate').textContent = item.birth_date || '未填';
            document.getElementById('modalPhone').textContent = item.phone || '未填';
            document.getElementById('modalEmail').textContent = item.email || '未填';
            document.getElementById('modalAddress').textContent = item.address || '未填';
            document.getElementById('modalDiet').textContent = item.dietary_habit || '未填';
            document.getElementById('modalEmergencyContact').textContent = item.emergency_contact || '未填';
            document.getElementById('modalEmergencyPhone').textContent = item.emergency_phone || '';
            document.getElementById('modalBio').textContent = item.bio || '未填';

            // 建立時間
            let formattedCreatedAt = '—';
            if (item.created_at) {
                const date = new Date(item.created_at);
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                const hh = String(date.getHours()).padStart(2, '0');
                const mm = String(date.getMinutes()).padStart(2, '0');
                const ss = String(date.getSeconds()).padStart(2, '0');
                formattedCreatedAt = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
            }
            document.getElementById('modalCreatedAt').textContent = formattedCreatedAt;

            // 專長
            const specContainer = document.getElementById('modalSpecialtiesContainer');
            specContainer.innerHTML = '';
            const coachSpecialties = item.all_specialties || item.coach_specialties;
            if (coachSpecialties && coachSpecialties.length > 0) {
                coachSpecialties.forEach(s => {
                    const badge = document.createElement('span');
                    badge.className = 'badge badge-info text-xs font-semibold mr-1 mb-1';
                    badge.textContent = s.specialty;
                    specContainer.appendChild(badge);
                });
            } else {
                specContainer.innerHTML = '<span class="text-slate-400 text-xs">尚無任何專長紀錄</span>';
            }

            // 證照
            const licContainer = document.getElementById('modalLicensesContainer');
            licContainer.innerHTML = '';
            if (item.coach_licenses && item.coach_licenses.length > 0) {
                item.coach_licenses.forEach(l => {
                    const badge = document.createElement('span');
                    badge.className = 'badge badge-success text-xs font-semibold mr-1 mb-1';
                    badge.textContent = l.license_name;
                    licContainer.appendChild(badge);
                });
            } else {
                licContainer.innerHTML = '<span class="text-slate-400 text-xs">尚無任何證照紀錄</span>';
            }

            document.getElementById('detailsModal').classList.remove('hidden');
        }

        // ==========================================================
        // 📥 【匯出教練資料至 Excel 功能】
        // ==========================================================
        async function exportToExcel() {
            let data = [];

            // 如果當前列表有資料，直接使用列表資料（包含搜尋/篩選過後的結果）
            if (window.instructorsData && window.instructorsData.length > 0) {
                data = window.instructorsData;
            } else {
                // 如果當前列表無資料，則主動從 Supabase 抓取「所有」教練資料進行匯出
                try {
                    const { data: allData, error } = await _supabase
                        .from('coach')
                        .select('*, coach_specialties ( specialty ), coach_licenses ( license_name )')
                        .order('created_at', { ascending: false });

                    if (error) {
                        alert('自動抓取所有教練資料失敗：' + error.message);
                        return;
                    }
                    data = allData;
                } catch (err) {
                    alert("擷取教練資料時發生錯誤：" + err.message);
                    return;
                }
            }

            if (!data || data.length === 0) {
                alert("目前資料庫中尚無任何教練資料可供匯出！");
                return;
            }

            try {
                // 將資料映射成中文標題的物件
                const excelData = data.map(item => {
                    const targetSpecialties = item.all_specialties || item.coach_specialties;
                    const specialtyList = (targetSpecialties && targetSpecialties.length > 0)
                        ? targetSpecialties.map(s => s.specialty).join(', ')
                        : '無';

                    const licenseList = (item.coach_licenses && item.coach_licenses.length > 0)
                        ? item.coach_licenses.map(l => l.license_name).join(', ')
                        : '無';

                    let formattedCreatedAt = '—';
                    if (item.created_at) {
                        const date = new Date(item.created_at);
                        const y = date.getFullYear();
                        const m = String(date.getMonth() + 1).padStart(2, '0');
                        const d = String(date.getDate()).padStart(2, '0');
                        const hh = String(date.getHours()).padStart(2, '0');
                        const mm = String(date.getMinutes()).padStart(2, '0');
                        const ss = String(date.getSeconds()).padStart(2, '0');
                        formattedCreatedAt = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
                    }

                    return {
                        '身分證字號': item.id_number,
                        '姓名': item.name,
                        '性別': item.gender,
                        '出生年月日': item.birth_date,
                        '聯絡電話': item.phone,
                        '電子信箱': item.email || '未填',
                        '飲食習慣': item.dietary_habit || '葷食',
                        '通訊地址': item.address || '未填',
                        '自我介紹': item.bio || '未填',
                        '緊急聯絡人姓名': item.emergency_contact || '未填',
                        '緊急聯絡人電話': item.emergency_phone || '未填',
                        '專長領域': specialtyList,
                        '專業證照': licenseList,
                        '登記時間': formattedCreatedAt
                    };
                });

                // 建立 Worksheet
                const worksheet = XLSX.utils.json_to_sheet(excelData);

                // 建立 Workbook
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "教練名冊");

                // 下載 Excel
                XLSX.writeFile(workbook, "教練名冊.xlsx");
            } catch (err) {
                alert("匯出 Excel 時發生錯誤：" + err.message);
                console.error(err);
            }
        }
