<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水域活動工作室 - 教練資料管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="site-header">
        <div class="site-header__inner">
            <div class="brand">
                <span class="brand__title">水域活動工作室</span>
                <span class="brand__mode">後端管理系統</span>
            </div>
            <nav class="nav">
                <a href="tourists.html" class="nav-link">遊客資料</a>
                <a href="coach.html" class="nav-link is-active">教練資料</a>
                <a href="equip.html" class="nav-link">器材資產</a>
                <a href="courses.html" class="nav-link">開設課程</a>
            </nav>
        </div>
    </header>

    <main class="container page">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="form-panel h-fit text-sm">
                <h2 class="text-lg font-semibold text-slate-700 mb-4">新增教練資料</h2>
                <form id="addInstructorForm" class="space-y-4">
                    <div class="form-group">
                        <label class="form-label">身分證字號</label>
                        <input type="text" id="iIdNumber" required pattern="^[A-Z][1-2][0-9]{8}$" placeholder="例如：A123456789" 
                               class="form-control uppercase">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="form-group">
                            <label class="form-label">姓名</label>
                            <input type="text" id="iName" required placeholder="教練姓名" 
                                   class="form-control">
                        </div>
                        <div class="form-group">
                            <label class="form-label">性別</label>
                            <select id="iGender" class="form-control">
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">出生年月日</label>
                        <input type="date" id="iBirthDate" required 
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">聯絡電話</label>
                        <input type="text" id="iPhone" required placeholder="例如：0912345678" 
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="iEmail" placeholder="coach@studio.com" 
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">飲食習慣</label>
                        <input type="text" id="iDiet" value="葷食" placeholder="例如：全素、葷食" 
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">地址</label>
                        <input type="text" id="iAddress" placeholder="例如：台北市信義區松仁路123號" 
                               class="form-control">
                    </div>
                    <div class="border-t pt-2 mt-2">
                        <label class="form-label flex justify-between items-center">
                            專長領域
                            <button type="button" onclick="addSpecialtyField()" class="btn btn-secondary text-xs" style="min-height: 24px; padding: 2px 6px;">新增欄位</button>
                        </label>
                        <div id="specialtiesContainer" class="space-y-2 mt-2">
                            <input type="text" name="specialty" placeholder="例如：SUP" class="form-control">
                        </div>
                    </div>
                    <div class="border-t pt-2 mt-2 mb-4">
                        <label class="form-label flex justify-between items-center">
                            專業證照
                            <button type="button" onclick="addLicenseField()" class="btn btn-secondary text-xs" style="min-height: 24px; padding: 2px 6px;">新增欄位</button>
                        </label>
                        <div id="licensesContainer" class="space-y-2 mt-2">
                            <input type="text" name="license" placeholder="例如：PADI OW 專任教練" class="form-control">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">自我介紹</label>
                        <textarea id="iBio" rows="2" placeholder="簡述教練背景或特殊專長..." 
                                  class="form-control" style="min-height: 80px;"></textarea>
                    </div>
                    <div class="border-t pt-2 mt-2 space-y-2">
                        <p class="text-xs font-bold text-slate-500">緊急聯絡資訊</p>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="iEmergencyContact" placeholder="姓名" 
                                   class="form-control text-xs" style="min-height: 36px;">
                            <input type="text" id="iEmergencyPhone" placeholder="電話" 
                                   class="form-control text-xs" style="min-height: 36px;">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        確認新增教練
                    </button>
                </form>
            </div>

            <div class="table-panel md:col-span-3">
                <div class="table-toolbar">
                    <h2 class="table-title">教練列表</h2>
                </div>
                
                <div class="p-5 border-b flex flex-col sm:flex-row gap-3 items-end text-sm">
                    <div class="w-full sm:flex-1">
                        <label class="form-label text-xs">綜合關鍵字搜尋</label>
                        <input type="text" id="searchKeyword" placeholder="搜尋姓名、身分證、電話..."
                               class="form-control mt-1">
                    </div>
                    <div class="w-full sm:w-[130px]">
                        <label class="form-label text-xs">性別篩選</label>
                        <select id="searchGender" class="form-control mt-1">
                            <option value="全部">全部性別</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="fetchInstructors()" class="btn btn-primary">
                            搜尋
                        </button>
                        <button onclick="resetFilters()" class="btn btn-secondary">
                            顯示所有
                        </button>
                    </div>
                </div>
                
                <div class="table-scroll">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>身分證字號</th>
                                <th>姓名(性別)</th>
                                <th>專長</th>
                                <th>證照</th>
                                <th>出生日期</th>
                                <th>電話</th>
                                <th>電子信箱</th>
                                <th class="text-center">飲食</th>
                                <th>地址</th>
                                <th>自我介紹</th>
                                <th>緊急聯絡人</th>
                                <th>加入時間</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="instructorTableBody">
                            <tr>
                                <td colspan="13" class="p-4 text-center text-slate-400">資料載入中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==========================================================
        // 🔑 填寫你的 Supabase 連線資訊
        // ==========================================================
        const SUPABASE_URL = 'https://myvxgyovbckilyoelgxe.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dnhneW92YmNraWx5b2VsZ3hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjU4MjUsImV4cCI6MjA5NzgwMTgyNX0.bj0b5c72OIB16kw811XfNpTKOAkq34Of4YzUeuVqLJI'; 

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.addEventListener('DOMContentLoaded', () => {
            fetchInstructors();
        });

        // ==========================================================
        // 🔍 【功能：查詢教練與篩選】
        // ==========================================================
        async function fetchInstructors() {
            const tbody = document.getElementById('instructorTableBody');
            tbody.innerHTML = '<tr><td colspan="13" class="p-4 text-center text-slate-400">正在檢索名冊...</td></tr>';
            
            const keyword = document.getElementById('searchKeyword').value.trim();
            const gender = document.getElementById('searchGender').value;

            let query = _supabase.from('coach').select(`
                *,
                coach_specialties ( specialty ),
                coach_licenses ( license_name )
            `);

            // 支援 姓名、身分證、電話 的萬用模糊搜尋
            if (keyword !== '') {
                query = query.or(`name.ilike.%${keyword}%,id_number.ilike.%${keyword}%,phone.ilike.%${keyword}%`);
            }

            // 性別過濾
            if (gender !== '全部') {
                query = query.eq('gender', gender);
            }

            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) {
                alert('教練資料讀取失敗：' + error.message);
                return;
            }

            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="13" class="p-4 text-center text-slate-400">找不到符合條件的教練資料</td></tr>`;
                return;
            }

            // 渲染表格
            data.forEach(item => {
                const specialtyList = (item.coach_specialties && item.coach_specialties.length > 0)
                    ? `<div class="flex flex-col gap-1 items-start">` + item.coach_specialties.map(s => `<span class="badge badge-info">${s.specialty}</span>`).join('') + `</div>`
                    : '<span class="text-slate-300">—</span>';

                const licenseList = (item.coach_licenses && item.coach_licenses.length > 0)
                    ? `<div class="flex flex-col gap-1 items-start">` + item.coach_licenses.map(l => `<span class="badge badge-muted">${l.license_name}</span>`).join('') + `</div>`
                    : '<span class="text-slate-300">—</span>';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="font-mono font-bold text-slate-600 whitespace-nowrap">${item.id_number}</td>
                    <td class="whitespace-nowrap">
                        <span class="font-medium">${item.name}</span>
                        <span class="text-xs text-slate-400">(${item.gender})</span>
                    </td>
                    <td class="text-slate-700 text-sm min-w-[100px] break-words">${specialtyList}</td>
                    <td class="text-slate-700 text-xs min-w-[170px] break-words">${licenseList}</td>
                    <td class="font-mono text-slate-500 whitespace-nowrap">${item.birth_date}</td>
                    <td class="font-mono text-slate-500 whitespace-nowrap">${item.phone}</td>
                    <td class="font-mono text-slate-500 min-w-[200px] break-all">${item.email || '<span class="text-slate-300">—</span>'}</td>
                    <td class="text-center whitespace-nowrap">
                        <span class="badge ${item.dietary_habit === '葷食' ? 'badge-muted' : 'badge-success'}">
                            ${item.dietary_habit}
                        </span>
                    </td>
                    <td class="font-mono text-slate-500 min-w-[200px] break-all">${item.address || '<span class="text-slate-300">未填</span>'}</td>
                    <td class="text-slate-500 max-w-[200px] truncate" title="${item.bio || ''}">${item.bio || '<span class="text-slate-300">—</span>'}</td>
                    <td class="text-slate-500 text-xs whitespace-nowrap">
                        <div class="font-medium text-slate-700">${item.emergency_contact || '未填'}</div>
                        <div class="font-mono text-slate-400 mt-0.5">${item.emergency_phone || ''}</div>
                    </td>
                    <td class="font-mono text-slate-500">${item.created_at}</td>
                    <td class="text-center whitespace-nowrap">
                        <button onclick="deleteInstructor('${item.id_number}')" 
                                class="btn btn-danger text-xs" style="min-height: 28px; padding: 4px 8px; box-shadow: none;">
                            刪除
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ==========================================================
        // ➕ 【新功能：動態新增專長與證照輸入框】
        // ==========================================================
        function addSpecialtyField() {
            const container = document.getElementById('specialtiesContainer');
            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'specialty';
            input.placeholder = '新增專長...';
            input.className = 'form-control';
            container.appendChild(input);
        }

        function addLicenseField() {
            const container = document.getElementById('licensesContainer');
            const input = document.createElement('input');
            input.type = 'text';
            input.name = 'license';
            input.placeholder = '新增證照...';
            input.className = 'form-control';
            container.appendChild(input);
        }

        // ==========================================================
        // 🔄 【功能：重設並顯示所有名冊】
        // ==========================================================
        function resetFilters() {
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchGender').value = '全部';
            fetchInstructors();
        }

        // ==========================================================
        // ➕ 【功能：新增教練 Create】
        // ==========================================================
        document.getElementById('addInstructorForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id_number = document.getElementById('iIdNumber').value.trim().toUpperCase();
            const name = document.getElementById('iName').value;
            const gender = document.getElementById('iGender').value;
            const birth_date = document.getElementById('iBirthDate').value;
            const phone = document.getElementById('iPhone').value;
            const email = document.getElementById('iEmail').value || null;
            const dietary_habit = document.getElementById('iDiet').value;
            const address = document.getElementById('iAddress').value || null;
            const bio = document.getElementById('iBio').value || null;
            const emergency_contact = document.getElementById('iEmergencyContact').value || null;
            const emergency_phone = document.getElementById('iEmergencyPhone').value || null;
            // 抓取所有動態輸入的【專長】與【證照】陣列，並過濾掉沒填寫的空字串
            const specialties = Array.from(document.querySelectorAll('input[name="specialty"]'))
                .map(input => input.value.trim())
                .filter(value => value !== '');
            const licenses = Array.from(document.querySelectorAll('input[name="license"]'))
                .map(input => input.value.trim())
                .filter(value => value !== '');

            const { error: instructorError } = await _supabase
                .from('coach')
                .insert([
                    { id_number, name, gender, birth_date, phone, email, dietary_habit, address, bio, emergency_contact, emergency_phone }
                ]);

            if (instructorError) {
                alert('新增失敗（身分證可能重複或格式錯誤）：' + instructorError.message);
                return; // 主檔失敗就立刻停止，不繼續寫入子表
            }

            if (specialties.length > 0) {
                // 將字串陣列轉換成 Supabase 需要的物件格式 [{id_number: 'A1...', specialty: 'SUP'}, ...]
                const specialtiesData = specialties.map(s => ({ id_number: id_number, specialty: s }));
                const { error: specError } = await _supabase.from('coach_specialties').insert(specialtiesData);
                if (specError) console.error('專長寫入異常:', specError);
            }

            if (licenses.length > 0) {
                const licensesData = licenses.map(l => ({ id_number: id_number, license_name: l }));
                const { error: licError } = await _supabase.from('coach_licenses').insert(licensesData);
                if (licError) console.error('證照寫入異常:', licError);
            }

            // === 全部完成後：重設畫面 ===
            alert('新教練資料建檔成功！');
            
            // 清空基本表單
            document.getElementById('addInstructorForm').reset();
            document.getElementById('iDiet').value = '葷食';
            
            // 將動態輸入區塊還原回最初「各只有一個輸入框」的狀態
            document.getElementById('specialtiesContainer').innerHTML = '<input type="text" name="specialty" placeholder="例如：SUP" class="form-control">';
            document.getElementById('licensesContainer').innerHTML = '<input type="text" name="license" placeholder="例如：PADI OW 專任教練" class="form-control">';
            
            // 重新整理右側列表
            fetchInstructors();
        });

        // ==========================================================
        // ❌ 【功能：刪除教練 Delete】
        // ==========================================================
        async function deleteInstructor(id_number) {
            if (!confirm(`確定要永久刪除教練 [${id_number}] 的資料嗎？\n請注意：這會連帶刪除該教練的專長與證照紀錄。`)) return;

            const { error } = await _supabase
                .from('coach')
                .delete()
                .eq('id_number', id_number);

            if (error) {
                alert('刪除失敗，該教練目前可能有開課場次或負責保管器材：' + error.message);
            } else {
                alert('教練資料已成功刪除！');
                fetchInstructors();
            }
        }
    </script>
</body>
</html>
