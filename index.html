<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水域活動工作室 - 後端管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen p-6 font-sans">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 border-b pb-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">水域活動工作室 - 後端管理系統</h1>
            </div>
            <div class="flex gap-2">
                <a href="tourists.html" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium px-4 py-2 rounded-md transition text-sm flex items-center gap-1">
                    遊客資料
                </a>
                <a href="instructors.html" class="bg-slate-100 hover:bg-slate-200 text-slate-600 font-medium px-4 py-2 rounded-md transition text-sm flex items-center gap-1">
                    教練資料
                </a>
                <a href="index.html" class="bg-blue-600 text-white font-medium px-4 py-2 rounded-md shadow-sm transition text-sm flex items-center gap-1">
                    器材資產
                </a>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-slate-200 h-fit text-sm">
                <h2 class="text-xl font-semibold text-slate-700 mb-4">新增器材資產</h2>
                <form id="addForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">器材名稱</label>
                        <input type="text" id="eqName" required placeholder="例如：紅槳10尺6吋SUP板" 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">器材類別</label>
                        <input type="text" id="eqCategory" required placeholder="例如：SUP板、蛙鞋、防寒衣" 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">購買日期</label>
                        <input type="date" id="eqPurchaseDate" required 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">器材狀態</label>
                        <select id="eqStatus" class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option value="正常">正常</option>
                            <option value="維修中">維修中</option>
                            <option value="報廢">報廢</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">購買單位</label>
                        <input type="text" id="eqPurchaseUnit"  
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">負責人身份證字號</label>
                        <input type="text" id="eqManagerId" required pattern="^[A-Z][1-2][0-9]{8}$" placeholder="例如：A123456789" 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none uppercase">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-600 mb-1">使用年限（單位：年）</label>
                        <input type="text" id="eqUsageLimit" required placeholder="例如：5" 
                               class="w-full p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-md transition duration-200">
                        確認新增
                    </button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 md:col-span-3">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-semibold text-slate-700">器材資產列表</h2>
                    <button onclick="fetchEquipment()" class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1 rounded-md transition">
                        重新整理
                    </button>
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse table-auto">
                        <thead>
                            <tr class="bg-slate-50 border-b border-slate-200 text-slate-600 text-sm font-medium">
                                <th class="p-3 w-[60px] whitespace-nowrap">ID</th>
                                <th class="p-3 w-[200px] whitespace-nowrap">器材名稱</th>
                                <th class="p-3 w-[100px] whitespace-nowrap">類別</th>
                                <th class="p-3 w-[110px] whitespace-nowrap">購買日期</th>
                                <th class="p-3 w-[90px] text-center whitespace-nowrap">狀態</th>
                                <th class="p-3 w-[150px] whitespace-nowrap">購買單位</th>
                                <th class="p-3 w-[160px] whitespace-nowrap">負責人身分證字號</th>
                                <th class="p-3 w-[100px] text-center whitespace-nowrap">使用年限</th>
                                <th class="p-3 w-[180px] whitespace-nowrap">建立時間</th>
                                <th class="p-3 w-[80px] text-center whitespace-nowrap">操作</th>
                            </tr>
                        </thead>
                        <tbody id="equipmentTableBody" class="text-slate-700 text-sm divide-y divide-slate-100">
                            <tr>
                                <td colspan="6" class="p-4 text-center text-slate-400">資料載入中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==========================================================
        // 🔑 填寫你的 Supabase 連線資訊
        // ==========================================================
        // ⚠️ 請在引號內替換為你在 Supabase 後端產生的專屬網址與 API 金鑰
        const SUPABASE_URL = 'https://myvxgyovbckilyoelgxe.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dnhneW92YmNraWx5b2VsZ3hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjU4MjUsImV4cCI6MjA5NzgwMTgyNX0.bj0b5c72OIB16kw811XfNpTKOAkq34Of4YzUeuVqLJI'; 

        // 2. 初始化 Supabase 客戶端
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 頁面加載完成後自動查詢一次資料
        document.addEventListener('DOMContentLoaded', () => {
            // 預設將購買日期填為今天
            document.getElementById('eqPurchaseDate').valueAsDate = new Date();
            fetchEquipment();
        });

        // ==========================================================
        // 🔍 【功能：查詢資料 Read】
        // ==========================================================
        async function fetchEquipment() {
            const tbody = document.getElementById('equipmentTableBody');
            
            // 向 Supabase 的 'equipment' 資料表請求所有欄位資料，並依 ID 排序
            const { data, error } = await _supabase
                .from('equipment')
                .select('*')
                .order('equipment_id', { ascending: true });

            if (error) {
                alert('資料讀取失敗：' + error.message);
                return;
            }

            // 清空舊資料
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="p-4 text-center text-slate-400">目前暫無任何器材資料</td></tr>`;
                return;
            }

            // 將資料渲染成表格 HTML
            data.forEach(item => {
                // 根據狀態給予不同顏色標籤
                let statusBadge = `<span class="px-2 py-1 rounded text-xs font-medium bg-green-100 text-green-700">${item.status}</span>`;
                if (item.status === '維修中') {
                    statusBadge = `<span class="px-2 py-1 rounded text-xs font-medium bg-yellow-100 text-yellow-700">${item.status}</span>`;
                } else if (item.status === '報廢') {
                    statusBadge = `<span class="px-2 py-1 rounded text-xs font-medium bg-red-100 text-red-700">${item.status}</span>`;
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition";
                tr.innerHTML = `
                    <td class="p-3 font-mono font-bold">${item.equipment_id}</td>
                    <td class="p-3 font-medium">${item.name}</td>
                    <td class="p-3 text-slate-500">${item.category}</td>
                    <td class="p-3 text-slate-500">${item.purchase_date}</td>
                    <td class="p-3 text-center whitespace-nowrap">${statusBadge}</td>
                    <td class="p-3 text-slate-500">${item.purchase_unit}</td>
                    <td class="p-3 text-slate-500">${item.manager_id}</td>
                    <td class="p-3 text-slate-500">${item.useful_life_years}</td>
                    <td class="p-3 text-slate-500">${item.created_at}</td>
                    <td class="p-3 text-center">
                        <button onclick="deleteEquipment(${item.equipment_id})" 
                                class="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-2 py-1 rounded border border-red-200 transition">
                            刪除
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ==========================================================
        // ➕ 【功能：新增資料 Create】
        // ==========================================================
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // 阻止表單預設跳頁行為

            const name = document.getElementById('eqName').value;
            const category = document.getElementById('eqCategory').value;
            const purchase_date = document.getElementById('eqPurchaseDate').value;
            const status = document.getElementById('eqStatus').value;
            const purchase_unit = document.getElementById('eqPurchaseUnit').value;
            const manager_id = document.getElementById('eqManagerId').value.toUpperCase(); // 將身份證字號轉為大寫
            const useful_life_years = document.getElementById('eqUsageLimit').value;

            // 呼叫 Supabase 的 insert 語法寫入資料
            const { error } = await _supabase
                .from('equipment')
                .insert([
                    { name, category, purchase_date, status, purchase_unit, manager_id, useful_life_years }
                ]);

            if (error) {
                alert('新增失敗：' + error.message);
            } else {
                alert('器材資產新增成功！');
                document.getElementById('eqName').value = ''; // 清空輸入框
                document.getElementById('eqCategory').value = '';
                fetchEquipment(); // 重新整理列表
            }
        });

        // ==========================================================
        // ❌ 【功能：刪除資料 Delete】
        // ==========================================================
        async function deleteEquipment(id) {
            if (!confirm(`確定要永久刪除編號 #${id} 的器材嗎？`)) return;

            // 呼叫 Supabase 的 delete 語法，指定對應的 equipment_id
            const { error } = await _supabase
                .from('equipment')
                .delete()
                .eq('equipment_id', id);

            if (error) {
                alert('刪除失敗，該器材可能正在被課程租借中：' + error.message);
            } else {
                alert('器材已成功刪除！');
                fetchEquipment(); // 重新整理列表
            }
        }
    </script>
</body>
</html>
