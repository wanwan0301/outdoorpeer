<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水域活動工作室 - 後端管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="site-header">
        <div class="site-header__inner">
            <div class="brand">
                <span class="brand__title">水域活動工作室</span>
                <span class="brand__mode">後端管理系統</span>
            </div>
            <nav class="nav">
                <a href="tourists.html" class="nav-link">遊客資料</a>
                <a href="coach.html" class="nav-link">教練資料</a>
                <a href="equip.html" class="nav-link is-active">器材資產</a>
            </nav>
        </div>
    </header>

    <main class="container page">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="form-panel h-fit text-sm">
                <h2 class="text-xl font-semibold text-slate-700 mb-4">新增器材資產</h2>
                <form id="addForm" class="space-y-4">
                    <div class="form-group">
                        <label class="form-label">器材名稱</label>
                        <input type="text" id="eqName" required placeholder="例如：紅槳10尺6吋SUP板" 
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">器材類別</label>
                        <input type="text" id="eqCategory" required placeholder="例如：SUP板、蛙鞋、防寒衣" 
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">購買日期</label>
                        <input type="date" id="eqPurchaseDate" required
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">器材狀態</label>
                        <select id="eqStatus" class="form-control">
                            <option value="未出借">未出借</option>
                            <option value="維修中">維修中</option>
                            <option value="報廢">報廢</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">購買單位</label>
                        <input type="text" id="eqPurchaseUnit"  
                               class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label">負責人</label>
                        <select id="eqManagerId" class="form-control">
                            <option value="">-- 請選擇負責人 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">使用年限（單位：年）</label>
                        <input type="text" id="eqUsageLimit" placeholder="例如：5" 
                               class="form-control">
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">
                        確認新增
                    </button>
                </form>
            </div>

            <div class="table-panel md:col-span-3">
                <div class="table-toolbar">
                    <h2 class="table-title">器材列表</h2>
                    <button onclick="exportToExcel()" class="btn btn-secondary text-xs" style="min-height: 32px; padding: 4px 12px; box-shadow: none;">
                        匯出 Excel
                    </button>
                </div>

                <div class="p-5 border-b flex flex-col sm:flex-row gap-3 items-end text-sm">
                    <div class="w-full sm:flex-1">
                        <label class="form-label text-xs">綜合關鍵字搜尋</label>
                        <input type="text" id="searchKeyword" placeholder="搜尋名稱、類別..."
                            class="form-control mt-1">
                    </div>
                    <div class="w-full sm:w-[130px]">
                        <label class="form-label text-xs">狀態</label>
                        <select id="searchStatus" class="form-control mt-1">
                            <option value="全部狀態">全部狀態</option>
                            <option value="未出借">未出借</option>
                            <option value="出借">出借</option>
                            <option value="維修中">維修中</option>
                            <option value="報廢">報廢</option>
                        </select>
                    </div>
                    <div class="flex gap-2 w-full sm:w-auto">
                        <button onclick="fetchEquipment()" class="btn btn-primary">
                            搜尋
                        </button>
                        <button onclick="resetFilters()" class="btn btn-secondary">
                            顯示所有
                        </button>
                    </div>
                </div>
                
                <div class="table-scroll">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>器材名稱</th>
                                <th>類別</th>
                                <th>購買日期</th>
                                <th class="text-center">狀態</th>
                                <th>購買單位</th>
                                <th>負責人</th>
                                <th class="text-center">使用年限</th>
                                <th class="text-center">剩餘年限</th>
                                <th>建立時間</th>
                                <th class="text-center">操作</th>
                            </tr>
                        </thead>
                        <tbody id="equipmentTableBody">
                            <tr>
                                <td colspan="11" class="p-4 text-center text-slate-400">資料載入中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- ==========================================================
         編輯器材資料模態框 (Modal)
         ========================================================== -->
    <div id="editModal"
        class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden transform transition-all m-4">
            <!-- Modal Header -->
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                    <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" stroke-width="2"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    修改器材資料
                </h3>
                <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <!-- Modal Body -->
            <form id="editForm" class="p-6 space-y-4 max-h-[75vh] overflow-y-auto">
                <div class="grid grid-cols-2 gap-3">
                    <div class="form-group">
                        <label class="form-label text-xs">器材編號</label>
                        <input type="text" id="editEqId" class="form-control" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label text-xs">器材名稱</label>
                        <input type="text" id="editEqName" required class="form-control">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="form-group">
                        <label class="form-label text-xs">器材類別</label>
                        <input type="text" id="editEqCategory" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label class="form-label text-xs">購買日期</label>
                        <input type="date" id="editEqPurchaseDate" required class="form-control">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="form-group">
                        <label class="form-label text-xs">器材狀態</label>
                        <select id="editEqStatus" class="form-control">
                            <option value="未出借">未出借</option>
                            <option value="出借">出借</option>
                            <option value="維修中">維修中</option>
                            <option value="報廢">報廢</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label text-xs">購買單位</label>
                        <input type="text" id="editEqPurchaseUnit" class="form-control">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="form-group">
                        <label class="form-label text-xs">負責人</label>
                        <select id="editEqManagerId" class="form-control">
                            <option value="">-- 請選擇負責人 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label text-xs">使用年限（單位：年）</label>
                        <input type="text" id="editEqUsageLimit" class="form-control">
                    </div>
                </div>

                <!-- Modal Footer -->
                <div class="pt-4 border-t border-slate-100 flex justify-end gap-2">
                    <button type="button" onclick="closeEditModal()"
                        class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-medium rounded-lg text-xs transition-colors">
                        取消
                    </button>
                    <button type="submit"
                        class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white font-medium rounded-lg text-xs transition-colors shadow-sm">
                        儲存修改
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <script>
        // ==========================================================
        // 🔑 填寫你的 Supabase 連線資訊
        // ==========================================================
        const SUPABASE_URL = 'https://myvxgyovbckilyoelgxe.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15dnhneW92YmNraWx5b2VsZ3hlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMjU4MjUsImV4cCI6MjA5NzgwMTgyNX0.bj0b5c72OIB16kw811XfNpTKOAkq34Of4YzUeuVqLJI'; 

        // 2. 初始化 Supabase 客戶端
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 頁面加載完成後自動查詢一次資料
        document.addEventListener('DOMContentLoaded', () => {
            // 預設將購買日期填為今天
            document.getElementById('eqPurchaseDate').valueAsDate = new Date();
            loadCoachesDropdown();
            fetchEquipment();
        });

        // ==========================================================
        // 👥 【載入負責人教練下拉選單】
        // ==========================================================
        async function loadCoachesDropdown() {
            try {
                const { data, error } = await _supabase
                    .from('coach')
                    .select('id_number, name')
                    .order('name');

                if (error) {
                    console.error('載入教練選單失敗:', error.message);
                    return;
                }

                const addSelect = document.getElementById('eqManagerId');
                const editSelect = document.getElementById('editEqManagerId');

                // 清空並加入預設選項
                addSelect.innerHTML = '<option value="">-- 請選擇負責人 (未指派) --</option>';
                editSelect.innerHTML = '<option value="">-- 請選擇負責人 (未指派) --</option>';

                data.forEach(coach => {
                    const optText = `${coach.name} (${coach.id_number})`;
                    const opt1 = new Option(optText, coach.id_number);
                    const opt2 = new Option(optText, coach.id_number);
                    addSelect.add(opt1);
                    editSelect.add(opt2);
                });
            } catch (err) {
                console.error('載入教練選單時發生異常:', err);
            }
        }

        // ==========================================================
        // 🔍 【功能：查詢資料 Read】
        // ==========================================================
        async function fetchEquipment() {
            const tbody = document.getElementById('equipmentTableBody');
            tbody.innerHTML = '<tr><td colspan="11" class="p-4 text-center text-slate-400">正在檢索名冊...</td></tr>';

            const keyword = document.getElementById('searchKeyword').value.trim();
            const status = document.getElementById('searchStatus').value;

            let query = _supabase.from('equipment').select('*, coach(name)'); // 建立 Supabase 基礎查詢物件，聯接教練表以獲取負責人姓名

            // 關鍵字多欄位模糊搜尋 (使用 Supabase 的 .or 條件)
            if (keyword !== '') {
                // ilike 代表不區分大小寫的模糊搜尋；用逗號隔開代表「或 (OR)」
                query = query.or(`name.ilike.%${keyword}%,category.ilike.%${keyword}%,manager_id.ilike.%${keyword}%`);
            }

            // 篩選狀態 (將前端的「未出借」、「出借」對照為資料庫的「正常」、「使用中」)
            if (status !== '全部狀態') {
                let dbStatus = status;
                if (status === '未出借') dbStatus = '正常';
                else if (status === '出借') dbStatus = '使用中';
                query = query.eq('status', dbStatus);
            }

            // 執行查詢並排序（新建立的在最前面）
            const { data, error } = await query.order('created_at', { ascending: false });

            if (error) {
                alert('器材資料讀取失敗：' + error.message);
                return;
            }

            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="11" class="p-4 text-center text-slate-400">找不到符合條件的器材資料</td></tr>`;
                return;
            }

            // 儲存到全域變數，供匯出功能使用
            window.equipData = data;

            // 將資料渲染成表格 HTML
            data.forEach((item, index) => {
                // 根據狀態給予不同顏色與中文字標籤 (資料庫 正常 -> 未出借; 使用中 -> 出借)
                let displayStatus = item.status;
                let badgeClass = 'badge-success'; // 預設為未出借 (正常) 綠色

                if (item.status === '正常') {
                    displayStatus = '未出借';
                    badgeClass = 'badge-success';
                } else if (item.status === '使用中') {
                    displayStatus = '出借';
                    badgeClass = 'badge-info';
                } else if (item.status === '維修中') {
                    displayStatus = '維修中';
                    badgeClass = 'badge-warning';
                } else if (item.status === '報廢') {
                    displayStatus = '報廢';
                    badgeClass = 'badge-danger';
                }

                let statusBadge = `<span class="badge ${badgeClass}">${displayStatus}</span>`;

                // 計算剩餘年限
                let remainingYears = '—';
                if (item.purchase_date && item.useful_life_years) {
                    const purchase = new Date(item.purchase_date);
                    const now = new Date();
                    const diffTime = now - purchase;
                    const diffYears = diffTime / (1000 * 60 * 60 * 24 * 365.25);
                    const remaining = item.useful_life_years - diffYears;
                    if (remaining <= 0) {
                        remainingYears = '<span class="text-red-500 font-bold">已逾期</span>';
                    } else {
                        remainingYears = `${Math.ceil(remaining)} 年`;
                    }
                }

                let formattedCreatedAt = '—';
                if (item.created_at) {
                    const date = new Date(item.created_at);
                    const y = date.getFullYear();
                    const m = String(date.getMonth() + 1).padStart(2, '0');
                    const d = String(date.getDate()).padStart(2, '0');
                    const hh = String(date.getHours()).padStart(2, '0');
                    const mm = String(date.getMinutes()).padStart(2, '0');
                    const ss = String(date.getSeconds()).padStart(2, '0');
                    formattedCreatedAt = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="font-mono font-bold">${item.equipment_id}</td>
                    <td class="font-medium">${item.name}</td>
                    <td class="text-slate-500">${item.category}</td>
                    <td class="text-slate-500">${item.purchase_date}</td>
                    <td class="text-center whitespace-nowrap">${statusBadge}</td>
                    <td class="text-slate-500">${item.purchase_unit}</td>
                    <td class="text-slate-500">${item.coach && item.coach.name ? item.coach.name : (item.manager_id || '<span class="text-slate-300">—</span>')}</td>
                    <td class="text-center text-slate-500">${item.useful_life_years ? item.useful_life_years + ' 年' : '—'}</td>
                    <td class="text-center text-slate-500">${remainingYears}</td>
                    <td class="text-slate-500 whitespace-nowrap font-mono">${formattedCreatedAt}</td>
                    <td class="text-center whitespace-nowrap">
                        <div class="flex gap-1.5 justify-center items-center">
                            <button onclick="showEditModal(${index})" 
                                    class="btn btn-primary text-xs" style="min-height: 28px; padding: 4px 8px; box-shadow: none;">
                                修改
                            </button>
                            <button onclick="deleteEquipment(${item.equipment_id})" 
                                    class="btn btn-danger text-xs" style="min-height: 28px; padding: 4px 8px; box-shadow: none;">
                                刪除
                            </button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ==========================================================
        // 【重設篩選條件並顯示所有名冊】
        // ==========================================================
        function resetFilters() {
            // 清空輸入框與下拉選單
            document.getElementById('searchKeyword').value = '';
            document.getElementById('searchStatus').value = '全部狀態';
            // 重新載入完整資料
            fetchEquipment();
        }

        // ==========================================================
        // ➕ 【功能：新增資料 Create】
        // ==========================================================
        document.getElementById('addForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // 阻止表單預設跳頁行為

            const name = document.getElementById('eqName').value;
            const category = document.getElementById('eqCategory').value;
            const purchase_date = document.getElementById('eqPurchaseDate').value;
            let status = document.getElementById('eqStatus').value;
            if (status === '未出借') {
                status = '正常';
            }
            const purchase_unit = document.getElementById('eqPurchaseUnit').value;
            const manager_id = document.getElementById('eqManagerId').value || null;
            const useful_life_years = document.getElementById('eqUsageLimit').value;

            // 呼叫 Supabase 的 insert 語法寫入資料
            const { error } = await _supabase
                .from('equipment')
                .insert([
                    { name, category, purchase_date, status, purchase_unit, manager_id, useful_life_years }
                ]);

            if (error) {
                alert('新增失敗：' + error.message);
            } else {
                alert('器材資產新增成功！');
                document.getElementById('eqName').value = ''; // 清空輸入框
                document.getElementById('eqCategory').value = '';
                fetchEquipment(); // 重新整理列表
            }
        });

        // ==========================================================
        // ❌ 【功能：刪除資料 Delete】
        // ==========================================================
        async function deleteEquipment(id) {
            if (!confirm(`確定要永久刪除編號 #${id} 的器材嗎？`)) return;

            // 呼叫 Supabase 的 delete 語法，指定對應的 equipment_id
            const { error } = await _supabase
                .from('equipment')
                .delete()
                .eq('equipment_id', id);

            if (error) {
                alert('刪除失敗，該器材可能正在被課程租借中：' + error.message);
            } else {
                alert('器材已成功刪除！');
                fetchEquipment(); // 重新整理列表
            }
        }

        // ==========================================================
        // 📥 【匯出器材資料至 Excel 功能】
        // ==========================================================
        async function exportToExcel() {
            let data = [];

            // 如果當前列表有資料，直接使用列表資料（包含搜尋/篩選過後的結果）
            if (window.equipData && window.equipData.length > 0) {
                data = window.equipData;
            } else {
                // 如果當前列表無資料，則主動從 Supabase 抓取「所有」器材資料進行匯出
                try {
                    const { data: allData, error } = await _supabase
                        .from('equipment')
                        .select('*, coach(name)')
                        .order('created_at', { ascending: false });

                    if (error) {
                        alert('自動抓取所有器材資料失敗：' + error.message);
                        return;
                    }
                    data = allData;
                } catch (err) {
                    alert("擷取器材資料時發生錯誤：" + err.message);
                    return;
                }
            }

            if (!data || data.length === 0) {
                alert("目前資料庫中尚無任何器材資料可供匯出！");
                return;
            }

            try {
                // 將資料映射成中文標題的物件
                const excelData = data.map(item => {
                    let displayStatus = item.status;
                    if (item.status === '正常') displayStatus = '未出借';
                    else if (item.status === '使用中') displayStatus = '出借';

                    // 計算剩餘年限
                    let remainingYears = '—';
                    if (item.purchase_date && item.useful_life_years) {
                        const purchase = new Date(item.purchase_date);
                        const now = new Date();
                        const diffTime = now - purchase;
                        const diffYears = diffTime / (1000 * 60 * 60 * 24 * 365.25);
                        const remaining = item.useful_life_years - diffYears;
                        remainingYears = remaining <= 0 ? '已逾期' : `${Math.ceil(remaining)} 年`;
                    }

                    let formattedCreatedAt = '—';
                    if (item.created_at) {
                        const date = new Date(item.created_at);
                        const y = date.getFullYear();
                        const m = String(date.getMonth() + 1).padStart(2, '0');
                        const d = String(date.getDate()).padStart(2, '0');
                        const hh = String(date.getHours()).padStart(2, '0');
                        const mm = String(date.getMinutes()).padStart(2, '0');
                        const ss = String(date.getSeconds()).padStart(2, '0');
                        formattedCreatedAt = `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
                    }

                    return {
                        '器材編號': item.equipment_id,
                        '器材名稱': item.name,
                        '類別': item.category,
                        '購買日期': item.purchase_date,
                        '狀態': displayStatus,
                        '購買單位': item.purchase_unit || '無',
                        '負責人': item.coach && item.coach.name ? item.coach.name : (item.manager_id || '未指派'),
                        '使用年限': item.useful_life_years ? `${item.useful_life_years} 年` : '—',
                        '剩餘年限': remainingYears,
                        '建立時間': formattedCreatedAt
                    };
                });

                // 建立 Worksheet
                const worksheet = XLSX.utils.json_to_sheet(excelData);
                
                // 建立 Workbook
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "器材名冊");

                // 下載 Excel
                XLSX.writeFile(workbook, "器材名冊.xlsx");
            } catch (err) {
                alert("匯出 Excel 時發生錯誤：" + err.message);
                console.error(err);
            }
        }

        // ==========================================================
        // ✏️ 【功能：修改資料與彈窗管理 Update】
        // ==========================================================
        function showEditModal(index) {
            const item = window.equipData[index];
            if (!item) return;

            document.getElementById('editEqId').value = item.equipment_id;
            document.getElementById('editEqName').value = item.name || '';
            document.getElementById('editEqCategory').value = item.category || '';
            document.getElementById('editEqPurchaseDate').value = item.purchase_date || '';
            
            // 將資料庫狀態正常與使用中，轉換為前端的未出借與出借
            let displayStatus = item.status;
            if (item.status === '正常') displayStatus = '未出借';
            else if (item.status === '使用中') displayStatus = '出借';
            document.getElementById('editEqStatus').value = displayStatus;

            document.getElementById('editEqPurchaseUnit').value = item.purchase_unit || '';
            document.getElementById('editEqManagerId').value = item.manager_id || '';
            document.getElementById('editEqUsageLimit').value = item.useful_life_years || '';

            document.getElementById('editModal').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('editEqId').value;
            const name = document.getElementById('editEqName').value;
            const category = document.getElementById('editEqCategory').value;
            const purchase_date = document.getElementById('editEqPurchaseDate').value;
            
            // 將前端狀態轉換為資料庫儲存的狀態
            let status = document.getElementById('editEqStatus').value;
            if (status === '未出借') {
                status = '正常';
            } else if (status === '出借') {
                status = '使用中';
            }

            const purchase_unit = document.getElementById('editEqPurchaseUnit').value;
            const manager_id = document.getElementById('editEqManagerId').value || null;
            const useful_life_years = document.getElementById('editEqUsageLimit').value || null;

            const { error } = await _supabase
                .from('equipment')
                .update({ name, category, purchase_date, status, purchase_unit, manager_id, useful_life_years })
                .eq('equipment_id', id);

            if (error) {
                alert('修改失敗：' + error.message);
            } else {
                alert('器材資料修改成功！');
                closeEditModal();
                fetchEquipment();
            }
        });
    </script>
</body>
</html>
